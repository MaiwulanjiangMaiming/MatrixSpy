name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: pip install scipy numpy h5py mat73 ruff mypy pytest
      - name: Ruff check
        run: ruff check extension/python/
      - name: Mypy check
        run: mypy extension/python/high_perf_parser.py --ignore-missing-imports --no-error-summary 2>&1

  python-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: pip install scipy numpy h5py mat73 pytest
      - name: Run pytest
        run: pytest tests/ -v

  typescript-compile:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: cd extension && npm ci
      - name: Compile
        run: cd extension && npm run compile
      - name: Lint
        run: cd extension && npm run lint
      - name: Test
        run: cd extension && npm test

  package:
    needs: [python-lint, python-test, typescript-compile]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install and package
        run: cd extension && npm ci && npx vsce package --no-dependencies
      - uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: extension/*.vsix

  publish-open-vsx:
    needs: [package]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: vsix
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install ovsx
        run: npm install -g ovsx
      - name: Publish to Open VSX
        run: ovsx publish *.vsix -p ${{ secrets.OPEN_VSX_TOKEN }}
        continue-on-error: true
