name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: pip install scipy numpy h5py mat73 pytest ruff mypy
      - name: Ruff check
        run: ruff check extension/python/
      - name: Mypy check
        run: mypy extension/python/high_perf_parser.py --ignore-missing-imports --no-error-summary 2>&1 || true
      - name: Run tests
        run: pytest tests/ -v

  typescript-compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: cd extension && npm ci
      - name: Compile
        run: cd extension && npm run compile

  package:
    needs: [python-tests, typescript-compile]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install and package
        run: cd extension && npm ci && npx vsce package --no-dependencies
      - uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: extension/*.vsix
